<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feliz Dia dos Namorados, Geovana!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ffccd5, #ff4d6d);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        .hearts-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ff6f91;
            border-radius: 50%;
            transform: rotate(-45deg);
            animation: floatUp 7s linear infinite;
            opacity: 0.7;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(-45deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-50px) rotate(-45deg);
                opacity: 0;
            }
        }

        .content-layer {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px #ff2e63;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 35px;
            background: #ff2e63;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #ff2e63;
            transition: .3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        /* Nova regra para a carta em tela cheia */
        .envelope {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff0f3;
            color: #b3344a;
            border-radius: 0;
            transform: scale(0);
            opacity: 0;
            visibility: hidden;
            padding: 40px 20px;
            box-sizing: border-box;
            z-index: 10;
            overflow-y: auto;
            text-align: center;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .envelope.open {
            transform: scale(1);
            opacity: 1;
            visibility: visible;
        }

        .envelope h2 {
            color: #d6336c;
        }

        .envelope p {
            font-size: 1.5rem;
            line-height: 1.6;
        }

        .close-btn {
            background: #ff4e73;
            border: none;
            padding: 12px 30px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .close-btn:hover {
            background: #ff2e63;
        }

        /* Efeito de coração pulsando ao abrir */
        .heart-pulse {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 127, 0.3);
            border-radius: 0;
            z-index: 5;
            opacity: 0;
            animation: pulseBackground 2s ease-in-out infinite;
        }

        @keyframes pulseBackground {
            0% {
                opacity: 0;
            }
            50% {
                opacity: 0.4;
            }
            100% {
                opacity: 0;
            }
        }
    </style>
</head>
